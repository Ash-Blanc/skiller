api_rate_limits:
  scrapebadger: 60
  twitter_api_io: 100
enable_metrics: true
environment: production
log_level: WARNING
metrics_export_interval: 60
parallel_config:
  auto_scale_down_threshold: 50.0
  batch_size: 8
  batch_timeout_seconds: 1800
  cache_ttl_seconds: 3600
  cpu_cores_per_workflow: 1
  cpu_threshold_percent: 80.0
  enable_caching: true
  enable_resource_monitoring: true
  max_concurrent_analysis: 4
  max_concurrent_data_collection: 2
  max_concurrent_workflows: 10
  max_retry_attempts: 3
  memory_limit_mb: 500
  memory_threshold_percent: 85.0
  monitoring_interval_seconds: 0.5
  quality_mode: quality
  retry_backoff_multiplier: 2.0
  timeout_seconds: 300
resource_requirements:
  max_concurrent_workflows: 10
  max_memory_per_workflow_mb: 500
  min_cpu_cores: 8
  min_disk_free_gb: 5.0
  min_memory_gb: 8.0
  recommended_cpu_cores: 16
  recommended_memory_gb: 16.0
